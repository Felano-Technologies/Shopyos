services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopyos-backend
    restart: unless-stopped
    command: npm start
    ports:
      - "${BACKEND_PORT:-5000}:5000"

  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: shopyos-socket
    restart: unless-stopped
    command: npm start
    ports:
      - "${SOCKET_PORT:-5001}:5001"

  notification-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopyos-notification-worker
    restart: unless-stopped
    command: npm run worker
