services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopyos-backend
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      - PORT=${BACKEND_PORT:-5000}
    command: sh -c "npm run migrate:apply && npm start"
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"

  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: shopyos-socket
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      - PORT=${SOCKET_PORT:-5001}
    command: npm start
    ports:
      - "${SOCKET_PORT:-5001}:${SOCKET_PORT:-5001}"
    depends_on:
      - backend

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopyos-notification-worker
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    command: npm run worker
    depends_on:
      - backend
