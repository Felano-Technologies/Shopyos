services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopyos-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Note: Environment variables like DATABASE_URL and REDIS_URL 
    # should be provided in the .env file or by the hosting provider (Sevalla).
    command: sh -c "npm run migrate:apply && npm start"
    ports:
      - "${BACKEND_PORT:-5000}:5000"

  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
    container_name: shopyos-socket
    restart: unless-stopped
    env_file:
      - ./socket/.env
    command: npm start
    ports:
      - "${SOCKET_PORT:-5001}:5001"

  notification-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopyos-notification-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: npm run worker
