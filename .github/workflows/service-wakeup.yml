name: Service Wakeup (8am UTC)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  wakeup:
    name: Resume Railway Backend
    runs-on: ubuntu-latest
    steps:
      - name: Resume service
        run: |
          curl -s -f -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation Resume($serviceId: String!, $environmentId: String!, $input: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: $serviceId, environmentId: $environmentId, input: $input) }",
              "variables": {
                "serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}",
                "environmentId": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}",
                "input": { "numReplicas": 1 }
              }
            }'
