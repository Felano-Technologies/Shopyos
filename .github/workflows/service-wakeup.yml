name: Service Wakeup (5am UTC)

on:
  schedule:
    - cron: '47 4 * * *'
  workflow_dispatch:

jobs:
  wakeup:
    name: Resume Railway Services
    runs-on: ubuntu-latest
    steps:
      - name: Resume Postgres
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg sid "${{ secrets.RAILWAY_POSTGRES_SERVICE_ID }}" \
              --arg eid "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
              '{query:"mutation($sid:String!,$eid:String!){serviceInstanceRedeploy(serviceId:$sid,environmentId:$eid)}",variables:{sid:$sid,eid:$eid}}')"

      - name: Resume Redis
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg sid "${{ secrets.RAILWAY_REDIS_SERVICE_ID }}" \
              --arg eid "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
              '{query:"mutation($sid:String!,$eid:String!){serviceInstanceRedeploy(serviceId:$sid,environmentId:$eid)}",variables:{sid:$sid,eid:$eid}}')"

      - name: Wait for databases to initialize
        run: sleep 15

      - name: Resume backend
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg sid "${{ secrets.RAILWAY_SERVICE_ID }}" \
              --arg eid "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
              '{query:"mutation($sid:String!,$eid:String!){serviceInstanceRedeploy(serviceId:$sid,environmentId:$eid)}",variables:{sid:$sid,eid:$eid}}')"
