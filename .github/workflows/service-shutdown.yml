name: Service Shutdown (8pm UTC)

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  shutdown:
    name: Pause Railway Backend
    runs-on: ubuntu-latest
    steps:
      - name: Pause service
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation Pause($serviceId: String!, $environmentId: String!) { serviceInstancePause(serviceId: $serviceId, environmentId: $environmentId) }",
              "variables": {
                "serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}",
                "environmentId": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
              }
            }'
