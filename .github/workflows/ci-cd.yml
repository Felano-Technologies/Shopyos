name: shopyos-ci-cd

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Socket install
        working-directory: socket
        run: npm ci

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend test
        working-directory: frontend
        run: npm test -- --watchAll=false

  docker-build-push:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopyos-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/shopyos-backend:${{ github.sha }}

      - name: Tag backend latest (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shopyos-backend:latest

      - name: Build and push socket image
        uses: docker/build-push-action@v6
        with:
          context: ./socket
          file: ./socket/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopyos-socket:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/shopyos-socket:${{ github.sha }}

      - name: Tag socket latest (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./socket
          file: ./socket/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shopyos-socket:latest
