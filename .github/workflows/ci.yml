name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  # ── Step 1 ─────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets & Leaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --verbose --redact --config .gitleaks.toml

  # ── Step 2 ─────────────────────────────────────────────────────
  backend-lint:
    name: Lint — Backend
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

  # ── Step 3 ─────────────────────────────────────────────────────
  frontend-lint:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  # ── Step 4 ─────────────────────────────────────────────────────
  frontend-test:
    name: Test — Frontend
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test -- --watchAll=false --ci --passWithNoTests --coverage
        working-directory: frontend

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore

  # ── Step 5 ─────────────────────────────────────────────────────
  backend-unit-tests:
    name: Test — Backend Unit
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests
        run: npm run test:unit -- --coverage
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENABLE_LOCAL_SOCKET: "false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/junit.xml
          if-no-files-found: ignore

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore

  # ── Step 6 ─────────────────────────────────────────────────────
  backend-integration:
    name: Test — Backend Integration
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-test]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shopyos_test
          POSTGRES_USER: shopyos
          POSTGRES_PASSWORD: shopyos_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U shopyos; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Apply database migrations
        run: npm run migrate:apply
        working-directory: backend
        env:
          DATABASE_URL: postgresql://shopyos:shopyos_ci_password@localhost:5432/shopyos_test
          PG_SSL: "false"
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://shopyos:shopyos_ci_password@localhost:5432/shopyos_test
          PG_SSL: "false"
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENABLE_LOCAL_SOCKET: "false"
          EMAIL_USERNAME: test@shopyos.local
          EMAIL_PASSWORD: test-password
          EMAIL_FROM: no-reply@shopyos.local

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/junit.xml
          if-no-files-found: ignore

  # ── Step 6.5 ───────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Step 7 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: [backend-integration, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Railway deployment
        run: |
          curl -s -f -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation Redeploy($serviceId: String!, $environmentId: String!) { serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId) }",
              "variables": {
                "serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}",
                "environmentId": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
              }
            }'
