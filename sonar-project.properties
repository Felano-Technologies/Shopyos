# SonarCloud Project Configuration
# Replace these with your actual SonarCloud keys if they differ
sonar.organization=felano-technologies
sonar.projectKey=Felano-Technologies_Shopyos
sonar.projectName=Shopyos

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Paths to the source directories (relative to this file)
sonar.sources=backend,frontend
sonar.tests=backend/tests,frontend/__tests__

# Exclude external libraries, build outputs, and tests from source analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.expo/**,**/__tests__/**,**/*.test.js,**/*.test.ts,**/*.test.tsx,**/tests/setup.js,**/coverage/**,**/shopyos_backup.dump

# Include tests specifically for test execution analysis
sonar.test.inclusions=backend/__tests__/**/*.js,backend/tests/**/*.js,frontend/__tests__/**/*.ts,frontend/__tests__/**/*.tsx,frontend/components/__tests__/**/*.tsx

# Paths to coverage reports
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
