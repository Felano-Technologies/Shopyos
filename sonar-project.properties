# SonarCloud Project Configuration
# Replace these with your actual SonarCloud keys if they differ
sonar.organization=felano-technologies
sonar.projectKey=Felano-Technologies_Shopyos
sonar.projectName=Shopyos

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Paths to the source directories (relative to this file)
sonar.sources=backend,frontend
sonar.tests=backend/tests,frontend/__tests__

# Exclude external libraries, build outputs, tests, migrations, assets, and generated files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.expo/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/tests/**,\
  **/coverage/**,\
  **/migrations/**,\
  **/seeds/**,\
  frontend/assets/**,\
  **/*.json,\
  **/*.svg,\
  **/*.png,\
  **/*.jpg,\
  **/shopyos_backup.dump

# Include tests specifically for test execution analysis
sonar.test.inclusions=backend/__tests__/**/*.js,backend/tests/**/*.js,frontend/__tests__/**/*.ts,frontend/__tests__/**/*.tsx,frontend/components/__tests__/**/*.tsx

# Exclude files from coverage analysis that are inherently hard to unit test:
#   frontend/app/**  — React Native screen/layout components (tested via E2E)
#   frontend/src/**  — background task definitions
#   frontend/constants/** — pure constant files, no logic
#   frontend/types/**   — TypeScript type definitions only
sonar.coverage.exclusions=\
  frontend/app/**,\
  frontend/src/**,\
  frontend/constants/**,\
  frontend/types/**

# Paths to coverage reports
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
